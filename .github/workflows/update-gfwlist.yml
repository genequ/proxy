name: Update GFWList Domains

on:
  schedule:
    # 每天定时运行一次（你可以根据需要调整时间）
    - cron: '0 0 * * *'  # 每天 UTC 时间 00:00 执行一次
  workflow_dispatch:
    # 支持手动触发
    inputs:
      trigger:
        description: 'Trigger GFWList update manually'
        required: true
        default: 'true'

jobs:
  update_gfwlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download GFWList and decode
      run: |
        # 下载 GFWList
        curl -O https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt
        # 解码 GFWList
        base64 --decode gfwlist.txt > gfwlist_decoded.txt
        # 提取域名并生成 JSON 文件
        awk -F '||' '{ if ($2 != "") print $2 }' gfwlist_decoded.txt | sed 's/^\*\./\./g' | sed 's/^/"/;s/$/"/' > gfwlist_domains.json
        # 打印检查
        cat gfwlist_domains.json

    - name: Commit and push gfwlist_domains.json
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: 'Update gfwlist_domains.json'
        file_pattern: 'gfwlist_domains.json'
        branch: main  # 或你想要的分支
