name: Update GFWList Domains

on:
  schedule:
    # 每天定时运行一次（你可以根据需要调整时间）
    - cron: '0 0 * * *'  # 每天 UTC 时间 00:00 执行一次
  workflow_dispatch:
    # 支持手动触发
    inputs:
      trigger:
        description: 'Trigger GFWList update manually'
        required: true
        default: 'true'

jobs:
  update_gfwlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download and process GFWList
      run: |
        # Download gfwlist.txt
        curl -O https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt
        if [ ! -s gfwlist.txt ]; then
          echo "Error: gfwlist.txt is empty or failed to download"
          exit 1
        fi

        # Decode Base64
        base64 --decode gfwlist.txt > gfwlist_decoded.txt
        if [ ! -s gfwlist_decoded.txt ]; then
          echo "Error: Decoded file is empty"
          exit 1
        fi

        # Parse domains
        awk -F '||' '{ if ($2 != "") print $2 }' gfwlist_decoded.txt | sed 's/^\*\./\./g' | sed 's/^/"/;s/$/"/' > gfwlist_domains.json
        if [ ! -s gfwlist_domains.json ]; then
          echo "Error: gfwlist_domains.json is empty"
          exit 1
        fi

        # Debug: Print the first few lines of each file
        echo "First few lines of gfwlist_decoded.txt:"
        head gfwlist_decoded.txt

        echo "First few lines of gfwlist_domains.json:"
        head gfwlist_domains.json

    - name: Commit and push gfwlist_domains.json
      env:
        GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}  # 使用你在 secrets 中配置的 PAT
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add gfwlist_domains.json
        git commit -m "Update gfwlist_domains.json"
        git push https://github.com/${{ github.repository }}.git HEAD:main
